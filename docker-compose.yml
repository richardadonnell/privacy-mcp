services:
  privacy-mcp:
    build: .
    ports:
      - "${PORT:-8001}:${PORT:-8001}"
    env_file:
      - path: .env
        required: false
    environment:
      - PRIVACY_API_KEY=${PRIVACY_API_KEY:?PRIVACY_API_KEY is required}
      - MCP_API_KEY=${MCP_API_KEY:?MCP_API_KEY is required}
      - PRIVACY_SANDBOX=${PRIVACY_SANDBOX:-false}
      - PORT=${PORT:-8001}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:' + __import__('os').environ.get('PORT','8001') + '/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
